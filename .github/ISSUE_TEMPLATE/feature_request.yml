name: Feature Request
description: Something should exist
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Classic renderer (cloud/hair)
        - Iteration viewers (2D/3D)
        - Julia Tunnels
        - UI / controls
        - Presets / settings
        - Export / sharing
        - New viewer or mode
        - Other
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What do you want?
      description: Describe the feature. What should it do? Why?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What problem does this solve? What are you doing today that this would improve?
    validations:
      required: false
  - type: textarea
    id: approach
    attributes:
      label: Possible approach
      description: If you have ideas on implementation, sketch them here. Not required.
    validations:
      required: false
