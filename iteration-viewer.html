<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mandelbrot Iteration Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #ccc; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
canvas { flex: 1; display: block; cursor: crosshair; }
#controls {
  background: #1a1a2e; padding: 10px 20px; display: flex; align-items: center; gap: 20px;
  border-top: 1px solid #333; flex-shrink: 0; flex-wrap: wrap;
}
#controls label { font-size: 13px; white-space: nowrap; }
#controls input[type="range"] { width: 300px; }
#controls .value { font-size: 18px; font-weight: bold; color: #4fc3f7; min-width: 40px; }
#controls select, #controls input[type="number"] {
  background: #222; color: #ccc; border: 1px solid #444; padding: 4px 8px; border-radius: 3px; font-size: 13px;
}
#info { font-size: 11px; color: #666; margin-left: auto; }
.group { display: flex; align-items: center; gap: 8px; }
button { background: #333; color: #ccc; border: 1px solid #555; padding: 4px 12px; border-radius: 3px; cursor: pointer; font-size: 12px; }
button:hover { background: #444; }
button.active { background: #4fc3f7; color: #111; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="controls">
  <div class="group">
    <label>Iteration:</label>
    <input type="range" id="iteration" min="0" max="200" value="1">
    <span class="value" id="iter-display">1</span>
  </div>
  <div class="group">
    <label>Max:</label>
    <input type="number" id="max-iter" value="200" min="1" max="2000" style="width:60px">
  </div>
  <div class="group">
    <label>Resolution:</label>
    <select id="resolution">
      <option value="200">200x200 (fast)</option>
      <option value="400" selected>400x400</option>
      <option value="800">800x800</option>
      <option value="1200">1200x1200 (slow)</option>
    </select>
  </div>
  <div class="group">
    <label>Point size:</label>
    <input type="range" id="point-size" min="1" max="8" value="2" style="width:80px">
  </div>
  <div class="group">
    <label>Color:</label>
    <select id="color-mode">
      <option value="0" selected>By source position</option>
      <option value="1">By escape distance</option>
      <option value="2">By iteration survived</option>
    </select>
  </div>
  <div class="group">
    <button id="play-btn" onclick="togglePlay()">Play &#9654;</button>
    <label>Speed:</label>
    <input type="range" id="speed" min="1" max="30" value="8" style="width:80px">
  </div>
  <div class="group">
    <button onclick="resetView()">Reset View</button>
  </div>
  <span id="info">Scroll to zoom, drag to pan | Points move to z_N position for each starting c</span>
</div>

<script>
const canvas = document.getElementById('canvas');
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
if (!gl) { document.body.innerHTML = '<h1 style="color:red;padding:40px">WebGL not supported</h1>'; }

// ── View state ───────────────────────────────────────────────────────────────
let centerX = 0.0, centerY = 0.0, zoom = 3.0;
let playing = false, animFrame = null;

// ── Shaders ──────────────────────────────────────────────────────────────────
// Vertex shader: each vertex is a starting point c.
// Iterates z = z^2 + c exactly u_iteration times,
// then positions the vertex at z_N's location in the complex plane.
const vertexSrc = `
  attribute vec2 a_c;  // starting point in complex plane
  uniform int u_iteration;
  uniform vec2 u_center;
  uniform float u_zoom;
  uniform float u_aspect;
  uniform float u_pointSize;
  uniform int u_colorMode;
  varying vec4 v_color;

  vec3 hsv2rgb(float h, float s, float v) {
    vec3 c = vec3(h * 6.0, s, v);
    vec3 rgb = clamp(abs(mod(c.x + vec3(0.0, 4.0, 2.0), 6.0) - 3.0) - 1.0, 0.0, 1.0);
    return v * mix(vec3(1.0), rgb, s);
  }

  void main() {
    vec2 c = a_c;
    vec2 z = vec2(0.0, 0.0);

    float maxMag = 0.0;
    int lastIter = 0;
    bool escaped = false;

    // Iterate z = z^2 + c exactly u_iteration times
    for (int i = 0; i < 2000; i++) {
      if (i >= u_iteration) break;
      float zx = z.x * z.x - z.y * z.y + c.x;
      float zy = 2.0 * z.x * z.y + c.y;
      z = vec2(zx, zy);

      float mag = z.x * z.x + z.y * z.y;
      if (mag > maxMag) maxMag = mag;
      if (mag > 100.0 && !escaped) {
        escaped = true;
        lastIter = i;
      }
    }

    // Position this point at where z ended up
    vec2 pos = z;

    // Map to screen coordinates
    pos = (pos - u_center) / u_zoom;
    pos.x /= u_aspect;

    gl_Position = vec4(pos, 0.0, 1.0);
    gl_PointSize = u_pointSize;

    // Color
    if (u_colorMode == 0) {
      // Color by original c position
      float hue = (atan(c.y, c.x) + 3.14159) / 6.28318;
      float sat = clamp(sqrt(c.x * c.x + c.y * c.y) / 2.0, 0.3, 1.0);
      float val = escaped ? 0.2 : 0.9;
      v_color = vec4(hsv2rgb(hue, sat, val), escaped ? 0.15 : 0.8);
    }
    else if (u_colorMode == 1) {
      // Color by how far z traveled
      float t = clamp(sqrt(maxMag) / 4.0, 0.0, 1.0);
      v_color = vec4(hsv2rgb(t * 0.7, 0.8, escaped ? 0.15 : 0.9), escaped ? 0.1 : 0.7);
    }
    else {
      // Color by which iteration it escaped (if it did)
      float hue = escaped ? float(lastIter) / 50.0 : 0.6;
      float val = escaped ? 0.15 : 0.9;
      v_color = vec4(hsv2rgb(hue, 0.7, val), escaped ? 0.1 : 0.7);
    }

    // Hide points that flew way off screen
    if (abs(pos.x) > 3.0 || abs(pos.y) > 3.0) {
      gl_Position = vec4(10.0, 10.0, 10.0, 1.0); // offscreen
    }
  }
`;

const fragmentSrc = `
  precision mediump float;
  varying vec4 v_color;
  void main() {
    // Circular point
    vec2 pc = gl_PointCoord * 2.0 - 1.0;
    if (dot(pc, pc) > 1.0) discard;
    gl_FragColor = v_color;
  }
`;

// ── WebGL setup ──────────────────────────────────────────────────────────────
function createShader(type, source) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(shader));
    return null;
  }
  return shader;
}

const vs = createShader(gl.VERTEX_SHADER, vertexSrc);
const fs = createShader(gl.FRAGMENT_SHADER, fragmentSrc);
const program = gl.createProgram();
gl.attachShader(program, vs);
gl.attachShader(program, fs);
gl.linkProgram(program);
if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
  console.error('Link error:', gl.getProgramInfoLog(program));
}
gl.useProgram(program);

// Uniforms
const uCenter = gl.getUniformLocation(program, 'u_center');
const uZoom = gl.getUniformLocation(program, 'u_zoom');
const uAspect = gl.getUniformLocation(program, 'u_aspect');
const uIter = gl.getUniformLocation(program, 'u_iteration');
const uPointSize = gl.getUniformLocation(program, 'u_pointSize');
const uColorMode = gl.getUniformLocation(program, 'u_colorMode');

// Attribute
const aC = gl.getAttribLocation(program, 'a_c');
gl.enableVertexAttribArray(aC);

// Point buffer — will be rebuilt when resolution changes
let pointBuffer = gl.createBuffer();
let pointCount = 0;

let rebuildTimeout = null;
function scheduleBuild() {
  // Debounce — don't rebuild on every scroll tick
  if (rebuildTimeout) clearTimeout(rebuildTimeout);
  rebuildTimeout = setTimeout(function() { buildPoints(); render(); }, 300);
}

function buildPoints() {
  const res = parseInt(document.getElementById('resolution').value);
  const maxIter = parseInt(document.getElementById('max-iter').value);
  const points = [];

  const t0 = performance.now();

  // Sample the current view region in the complex plane
  const aspect = canvas.width / canvas.height || 1.6;
  const viewReMin = centerX - zoom * aspect;
  const viewReMax = centerX + zoom * aspect;
  const viewImMin = centerY - zoom;
  const viewImMax = centerY + zoom;

  // Add some padding so points that start outside the view but
  // iterate INTO it are still captured
  const padRe = (viewReMax - viewReMin) * 0.25;
  const padIm = (viewImMax - viewImMin) * 0.25;
  const reMin = viewReMin - padRe;
  const reMax = viewReMax + padRe;
  const imMin = viewImMin - padIm;
  const imMax = viewImMax + padIm;

  // Prefilter: only keep points that survive past 25% of max iterations
  const survivalThreshold = Math.max(2, Math.floor(maxIter * 0.25));

  let sampled = 0;
  for (let i = 0; i < res; i++) {
    for (let j = 0; j < res; j++) {
      const cRe = reMin + (i / res) * (reMax - reMin);
      const cIm = imMin + (j / res) * (imMax - imMin);
      sampled++;

      // CPU iteration to filter
      let zRe = 0, zIm = 0;
      let escaped = false;
      let escapeIter = maxIter;
      for (let k = 0; k < maxIter; k++) {
        const zRe2 = zRe * zRe - zIm * zIm + cRe;
        const zIm2 = 2 * zRe * zIm + cIm;
        zRe = zRe2;
        zIm = zIm2;
        if (zRe * zRe + zIm * zIm > 100) {
          escaped = true;
          escapeIter = k;
          break;
        }
      }

      // Keep points that survived past the threshold
      if (escapeIter >= survivalThreshold) {
        points.push(cRe, cIm);
      }
    }
  }

  pointCount = points.length / 2;
  const elapsed = (performance.now() - t0).toFixed(0);
  document.getElementById('info').textContent =
    `${pointCount.toLocaleString()} interesting points from ${sampled.toLocaleString()} sampled (${elapsed}ms) | Scroll to zoom, drag to pan`;

  gl.bindBuffer(gl.ARRAY_BUFFER, pointBuffer);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(points), gl.STATIC_DRAW);
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);

  gl.clearColor(0.05, 0.05, 0.08, 1.0);
  gl.clear(gl.COLOR_BUFFER_BIT);

  // Enable blending for transparency
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

  const iteration = parseInt(document.getElementById('iteration').value);
  const colorMode = parseInt(document.getElementById('color-mode').value);
  const pointSize = parseFloat(document.getElementById('point-size').value);
  const aspect = canvas.width / canvas.height;

  gl.uniform2f(uCenter, centerX, centerY);
  gl.uniform1f(uZoom, zoom);
  gl.uniform1f(uAspect, aspect);
  gl.uniform1i(uIter, iteration);
  gl.uniform1i(uColorMode, colorMode);
  gl.uniform1f(uPointSize, pointSize);

  gl.bindBuffer(gl.ARRAY_BUFFER, pointBuffer);
  gl.vertexAttribPointer(aC, 2, gl.FLOAT, false, 0, 0);

  gl.drawArrays(gl.POINTS, 0, pointCount);
}

// ── Controls ─────────────────────────────────────────────────────────────────
const iterSlider = document.getElementById('iteration');
const iterDisplay = document.getElementById('iter-display');
const maxIterInput = document.getElementById('max-iter');

iterSlider.addEventListener('input', function() {
  iterDisplay.textContent = this.value;
  render();
});

maxIterInput.addEventListener('change', function() {
  iterSlider.max = this.value;
  buildPoints();  // re-filter with new max iterations
  render();
});

document.getElementById('color-mode').addEventListener('change', render);
document.getElementById('point-size').addEventListener('input', render);
document.getElementById('resolution').addEventListener('change', function() {
  buildPoints();
  render();
});

// ── Play/animate ─────────────────────────────────────────────────────────────
function togglePlay() {
  playing = !playing;
  document.getElementById('play-btn').textContent = playing ? 'Pause \u23F8' : 'Play \u25B6';
  document.getElementById('play-btn').classList.toggle('active', playing);
  if (playing) requestAnimationFrame(animate);
  else if (animFrame) cancelAnimationFrame(animFrame);
}

let lastTime = 0;
function animate(time) {
  if (!playing) return;
  const speed = parseInt(document.getElementById('speed').value);
  const interval = 1000 / speed;

  if (time - lastTime > interval) {
    lastTime = time;
    let val = parseInt(iterSlider.value) + 1;
    if (val > parseInt(iterSlider.max)) val = 0;
    iterSlider.value = val;
    iterDisplay.textContent = val;
    render();
  }
  animFrame = requestAnimationFrame(animate);
}

// ── Zoom + Pan ───────────────────────────────────────────────────────────────
canvas.addEventListener('wheel', function(e) {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 1.1 : 0.9;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width * 2 - 1;
  const my = -((e.clientY - rect.top) / rect.height * 2 - 1);
  const aspect = canvas.width / canvas.height;

  centerX += mx * aspect * zoom * (1 - factor);
  centerY += my * zoom * (1 - factor);
  zoom *= factor;
  render();
  scheduleBuild();  // resample for new view
}, { passive: false });

let dragging = false, dragX, dragY;
canvas.addEventListener('mousedown', function(e) {
  dragging = true; dragX = e.clientX; dragY = e.clientY;
});
canvas.addEventListener('mousemove', function(e) {
  if (!dragging) return;
  const dx = e.clientX - dragX, dy = e.clientY - dragY;
  dragX = e.clientX; dragY = e.clientY;
  const aspect = canvas.width / canvas.height;
  centerX -= (dx / canvas.width) * 2 * zoom * aspect;
  centerY += (dy / canvas.height) * 2 * zoom;
  render();
});
canvas.addEventListener('mouseup', function() { if (dragging) scheduleBuild(); dragging = false; });
canvas.addEventListener('mouseleave', function() { if (dragging) scheduleBuild(); dragging = false; });

function resetView() {
  centerX = 0.0; centerY = 0.0; zoom = 3.0;
  buildPoints();
  render();
}

// ── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('resize', render);
buildPoints();
render();
</script>
</body>
</html>
