<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mandelbrot Iteration Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #ccc; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
canvas { flex: 1; display: block; cursor: crosshair; }
#controls {
  background: #1a1a2e; padding: 10px 20px; display: flex; align-items: center; gap: 20px;
  border-top: 1px solid #333; flex-shrink: 0;
}
#controls label { font-size: 13px; white-space: nowrap; }
#controls input[type="range"] { width: 300px; }
#controls .value { font-size: 18px; font-weight: bold; color: #4fc3f7; min-width: 40px; }
#controls select, #controls input[type="number"] {
  background: #222; color: #ccc; border: 1px solid #444; padding: 4px 8px; border-radius: 3px; font-size: 13px;
}
#info { font-size: 11px; color: #666; margin-left: auto; }
.group { display: flex; align-items: center; gap: 8px; }
button { background: #333; color: #ccc; border: 1px solid #555; padding: 4px 12px; border-radius: 3px; cursor: pointer; font-size: 12px; }
button:hover { background: #444; }
button.active { background: #4fc3f7; color: #111; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="controls">
  <div class="group">
    <label>Iteration:</label>
    <input type="range" id="iteration" min="0" max="200" value="1">
    <span class="value" id="iter-display">1</span>
  </div>
  <div class="group">
    <label>Max:</label>
    <input type="number" id="max-iter" value="200" min="1" max="2000" style="width:60px">
  </div>
  <div class="group">
    <label>Color:</label>
    <select id="color-mode">
      <option value="0">Magnitude (|z|)</option>
      <option value="1">Phase (arg z)</option>
      <option value="2" selected>Position (Re→R, Im→G)</option>
      <option value="3">Escape flag</option>
    </select>
  </div>
  <div class="group">
    <button id="play-btn" onclick="togglePlay()">Play ▶</button>
    <label>Speed:</label>
    <input type="range" id="speed" min="1" max="30" value="10" style="width:80px">
  </div>
  <div class="group">
    <button onclick="resetView()">Reset View</button>
  </div>
  <span id="info">Scroll to zoom, drag to pan</span>
</div>

<script>
const canvas = document.getElementById('canvas');
const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
if (!gl) { document.body.innerHTML = '<h1 style="color:red;padding:40px">WebGL not supported</h1>'; }

// ── View state ───────────────────────────────────────────────────────────────
let centerX = -0.5, centerY = 0.0, zoom = 1.5;
let playing = false, animFrame = null;

// ── Shader sources ───────────────────────────────────────────────────────────
const vertexSrc = `
  attribute vec2 a_position;
  void main() { gl_Position = vec4(a_position, 0.0, 1.0); }
`;

const fragmentSrc = `
  precision highp float;
  uniform vec2 u_resolution;
  uniform vec2 u_center;
  uniform float u_zoom;
  uniform int u_iteration;
  uniform int u_colorMode;

  vec3 hsv2rgb(float h, float s, float v) {
    vec3 c = vec3(h * 6.0, s, v);
    vec3 rgb = clamp(abs(mod(c.x + vec3(0.0, 4.0, 2.0), 6.0) - 3.0) - 1.0, 0.0, 1.0);
    return v * mix(vec3(1.0), rgb, s);
  }

  void main() {
    vec2 uv = (gl_FragCoord.xy / u_resolution) * 2.0 - 1.0;
    float aspect = u_resolution.x / u_resolution.y;
    uv.x *= aspect;

    // Map pixel to complex plane
    float re = uv.x * u_zoom + u_center.x;
    float im = uv.y * u_zoom + u_center.y;

    vec2 c = vec2(re, im);
    vec2 z = vec2(0.0, 0.0);

    bool escaped = false;
    int escapeIter = 0;

    // Iterate exactly u_iteration times
    for (int i = 0; i < 2000; i++) {
      if (i >= u_iteration) break;

      // z = z^2 + c
      float zx = z.x * z.x - z.y * z.y + c.x;
      float zy = 2.0 * z.x * z.y + c.y;
      z = vec2(zx, zy);

      float mag = z.x * z.x + z.y * z.y;
      if (mag > 4.0 && !escaped) {
        escaped = true;
        escapeIter = i;
      }
    }

    float mag = sqrt(z.x * z.x + z.y * z.y);
    float phase = atan(z.y, z.x);
    vec3 color;

    if (u_colorMode == 0) {
      // Magnitude — map |z| to color, cap at 4
      float t = clamp(mag / 4.0, 0.0, 1.0);
      color = hsv2rgb(t * 0.8, 0.9, escaped ? 0.9 : 0.3);
    }
    else if (u_colorMode == 1) {
      // Phase — angle of z mapped to hue
      float hue = (phase + 3.14159) / 6.28318;
      float brightness = escaped ? 0.15 : clamp(1.0 - mag / 4.0, 0.2, 1.0);
      color = hsv2rgb(hue, 0.8, brightness);
    }
    else if (u_colorMode == 2) {
      // Position — Re(z) → red, Im(z) → green, |z| → blue
      float r = clamp((z.x + 2.0) / 4.0, 0.0, 1.0);
      float g = clamp((z.y + 2.0) / 4.0, 0.0, 1.0);
      float b = clamp(mag / 4.0, 0.0, 1.0);
      color = escaped ? vec3(r, g, b) * 0.15 : vec3(r, g, b);
    }
    else {
      // Escape flag — bright if still bounded, dim if escaped
      float t = escaped ? 0.1 : 0.9;
      float hue = float(escapeIter) / 50.0;
      color = escaped ? hsv2rgb(hue, 0.6, 0.3) : vec3(t);
    }

    gl_FragColor = vec4(color, 1.0);
  }
`;

// ── WebGL setup ──────────────────────────────────────────────────────────────
function createShader(type, source) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(shader));
    return null;
  }
  return shader;
}

const vs = createShader(gl.VERTEX_SHADER, vertexSrc);
const fs = createShader(gl.FRAGMENT_SHADER, fragmentSrc);
const program = gl.createProgram();
gl.attachShader(program, vs);
gl.attachShader(program, fs);
gl.linkProgram(program);
gl.useProgram(program);

// Full-screen quad
const quad = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(program, 'a_position');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// Uniforms
const uRes = gl.getUniformLocation(program, 'u_resolution');
const uCenter = gl.getUniformLocation(program, 'u_center');
const uZoom = gl.getUniformLocation(program, 'u_zoom');
const uIter = gl.getUniformLocation(program, 'u_iteration');
const uColorMode = gl.getUniformLocation(program, 'u_colorMode');

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);

  const iteration = parseInt(document.getElementById('iteration').value);
  const colorMode = parseInt(document.getElementById('color-mode').value);

  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform2f(uCenter, centerX, centerY);
  gl.uniform1f(uZoom, zoom);
  gl.uniform1i(uIter, iteration);
  gl.uniform1i(uColorMode, colorMode);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ── Controls ─────────────────────────────────────────────────────────────────
const iterSlider = document.getElementById('iteration');
const iterDisplay = document.getElementById('iter-display');
const maxIterInput = document.getElementById('max-iter');

iterSlider.addEventListener('input', function() {
  iterDisplay.textContent = this.value;
  render();
});

maxIterInput.addEventListener('change', function() {
  iterSlider.max = this.value;
  render();
});

document.getElementById('color-mode').addEventListener('change', render);

// ── Play/animate ─────────────────────────────────────────────────────────────
function togglePlay() {
  playing = !playing;
  document.getElementById('play-btn').textContent = playing ? 'Pause ⏸' : 'Play ▶';
  document.getElementById('play-btn').classList.toggle('active', playing);
  if (playing) animate();
  else if (animFrame) cancelAnimationFrame(animFrame);
}

let lastTime = 0;
function animate(time) {
  if (!playing) return;
  const speed = parseInt(document.getElementById('speed').value);
  const interval = 1000 / speed;

  if (time - lastTime > interval) {
    lastTime = time;
    let val = parseInt(iterSlider.value) + 1;
    if (val > parseInt(iterSlider.max)) val = 0;
    iterSlider.value = val;
    iterDisplay.textContent = val;
    render();
  }
  animFrame = requestAnimationFrame(animate);
}

// ── Zoom + Pan ───────────────────────────────────────────────────────────────
canvas.addEventListener('wheel', function(e) {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 1.1 : 0.9;
  // Zoom toward mouse position
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width * 2 - 1;
  const my = -((e.clientY - rect.top) / rect.height * 2 - 1);
  const aspect = canvas.width / canvas.height;

  centerX += mx * aspect * zoom * (1 - factor);
  centerY += my * zoom * (1 - factor);
  zoom *= factor;
  render();
}, { passive: false });

let dragging = false, dragX, dragY;
canvas.addEventListener('mousedown', function(e) {
  dragging = true; dragX = e.clientX; dragY = e.clientY;
});
canvas.addEventListener('mousemove', function(e) {
  if (!dragging) return;
  const dx = e.clientX - dragX, dy = e.clientY - dragY;
  dragX = e.clientX; dragY = e.clientY;
  const aspect = canvas.width / canvas.height;
  centerX -= (dx / canvas.width) * 2 * zoom * aspect;
  centerY += (dy / canvas.height) * 2 * zoom;
  render();
});
canvas.addEventListener('mouseup', function() { dragging = false; });
canvas.addEventListener('mouseleave', function() { dragging = false; });

function resetView() {
  centerX = -0.5; centerY = 0.0; zoom = 1.5;
  render();
}

// ── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('resize', render);
render();
</script>
</body>
</html>
